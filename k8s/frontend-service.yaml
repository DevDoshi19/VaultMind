# k8s/frontend-service.yaml
# NodePort exposes the frontend outside the cluster.
# K8s maps nodePort 30501 on the minikube node to port 8501 in the container.
# We use minikube service command to get the browser URL — minikube
# handles the tunneling from your Windows machine into the cluster.
apiVersion: v1
kind: Service
metadata:
  name: vaultmind-frontend-service
  namespace: vaultmind
spec:
  type: NodePort
  selector:
    app: vaultmind-frontend
  ports:
    - protocol: TCP
      port: 8501        # port exposed inside the cluster
      targetPort: 8501  # port Streamlit listens on inside the container
      nodePort: 30501   # port opened on the minikube node (30000-32767 range)